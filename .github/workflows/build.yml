name: Home Plate Build Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build iOS simulator target
        run: xcodebuild -quiet -project HomePlate.xcodeproj -scheme HomePlate -destination 'generic/platform=iOS Simulator' -configuration Debug CODE_SIGNING_ALLOWED=NO build

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build macOS target
        run: xcodebuild -quiet -project HomePlate.xcodeproj -scheme HomePlateMac -destination 'platform=macOS' -configuration Debug CODE_SIGNING_ALLOWED=NO build
