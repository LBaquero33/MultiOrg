name: DHDSelfDevelopment
options:
  bundleIdPrefix: com.dhd
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  minimumXcodeGenVersion: "2.45.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    DEVELOPMENT_TEAM: ""

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Configs/Secrets.xcconfig
  Release: Configs/Secrets.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  DHDSelfDevelopment:
    type: application
    platform: iOS
    sources:
      - path: DHDSelfDevelopment
        excludes:
          - "**/*.md"
    info:
      path: DHDSelfDevelopment/Supporting/Info.plist
      properties:
        DHD_APP_DISPLAY_NAME: $(DHD_APP_DISPLAY_NAME)
        SUPABASE_HOST: $(SUPABASE_HOST)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        DHD_SUPPORT_EMAIL: $(DHD_SUPPORT_EMAIL)
        DHD_WEBSITE_HOST: $(DHD_WEBSITE_HOST)
        DHD_LEGACY_EMAIL_DOMAIN: $(DHD_LEGACY_EMAIL_DOMAIN)
        DHD_BYPASS_ACCESS: $(DHD_BYPASS_ACCESS)
        DHD_ENABLE_ENTITLEMENT_TEST: $(DHD_ENABLE_ENTITLEMENT_TEST)
        DHD_STRIPE_SUBSCRIBE_URL: $(DHD_STRIPE_SUBSCRIBE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dhd.selfdevelopment.multiorg
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: DHDSelfDevelopment/Supporting/DHDSelfDevelopment.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: Supabase
    scheme:
      testTargets: []

  DHDSelfDevelopmentMac:
    type: application
    platform: macOS
    sources:
      - path: DHDSelfDevelopment
        excludes:
          - "**/*.md"
          - "Features/Player/**"
          - "Supporting/LaunchScreen.storyboard"
    info:
      path: DHDSelfDevelopment/Supporting/Info.plist
      properties:
        DHD_APP_DISPLAY_NAME: $(DHD_APP_DISPLAY_NAME)
        SUPABASE_HOST: $(SUPABASE_HOST)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        DHD_SUPPORT_EMAIL: $(DHD_SUPPORT_EMAIL)
        DHD_WEBSITE_HOST: $(DHD_WEBSITE_HOST)
        DHD_LEGACY_EMAIL_DOMAIN: $(DHD_LEGACY_EMAIL_DOMAIN)
        DHD_BYPASS_ACCESS: $(DHD_BYPASS_ACCESS)
        DHD_ENABLE_ENTITLEMENT_TEST: $(DHD_ENABLE_ENTITLEMENT_TEST)
        DHD_STRIPE_SUBSCRIBE_URL: $(DHD_STRIPE_SUBSCRIBE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dhd.selfdevelopment.multiorg.mac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconMac
        CODE_SIGN_ENTITLEMENTS: DHDSelfDevelopment/Supporting/DHDSelfDevelopmentMac.entitlements
    dependencies:
      - package: Supabase
    scheme:
      testTargets: []
