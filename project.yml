name: MultiOrg
options:
  bundleIdPrefix: com.multiorg
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  minimumXcodeGenVersion: "2.45.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    DEVELOPMENT_TEAM: ""

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Configs/Secrets.xcconfig
  Release: Configs/Secrets.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  MultiOrg:
    type: application
    platform: iOS
    sources:
      # Recursive source discovery includes modular Phase 11A-11E models and coach UI.
      - path: MultiOrg
        excludes:
          - "**/*.md"
          - "Supporting/Info.plist"
    info:
      path: Configs/MultiOrg-iOS-Info.plist
      properties:
        DHD_APP_DISPLAY_NAME: $(DHD_APP_DISPLAY_NAME)
        SUPABASE_HOST: $(SUPABASE_HOST)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        DHD_SUPPORT_EMAIL: $(DHD_SUPPORT_EMAIL)
        DHD_WEBSITE_HOST: $(DHD_WEBSITE_HOST)
        DHD_LEGACY_EMAIL_DOMAIN: $(DHD_LEGACY_EMAIL_DOMAIN)
        DHD_BYPASS_ACCESS: $(DHD_BYPASS_ACCESS)
        DHD_ENABLE_ENTITLEMENT_TEST: $(DHD_ENABLE_ENTITLEMENT_TEST)
        DHD_STRIPE_SUBSCRIBE_URL: $(DHD_STRIPE_SUBSCRIBE_URL)
        DHD_APNS_ENVIRONMENT: $(DHD_APNS_ENVIRONMENT)
        UIRequiresFullScreen: false
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.multiorg.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: MultiOrg/Supporting/MultiOrg.entitlements
        DEVELOPMENT_TEAM: L9HQB8S3M3
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          APS_ENVIRONMENT: development
          DHD_APNS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
          DHD_APNS_ENVIRONMENT: production
    dependencies:
      - package: Supabase
    scheme:
      testTargets:
        - MultiOrgTests

  MultiOrgTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MultiOrgTests
      - path: SharedFixtures/apple_player_purchase_context_vectors.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.multiorg.app.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MultiOrg

  MultiOrgMac:
    type: application
    platform: macOS
    sources:
      - path: MultiOrg
        excludes:
          - "**/*.md"
          - "Features/Player/**"
          - "Supporting/LaunchScreen.storyboard"
      - path: MultiOrg/Features/Player/PlayerDevelopmentPlayerWorkspaceView.swift
    info:
      path: MultiOrg/Supporting/Info.plist
      properties:
        DHD_APP_DISPLAY_NAME: $(DHD_APP_DISPLAY_NAME)
        SUPABASE_HOST: $(SUPABASE_HOST)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        DHD_SUPPORT_EMAIL: $(DHD_SUPPORT_EMAIL)
        DHD_WEBSITE_HOST: $(DHD_WEBSITE_HOST)
        DHD_LEGACY_EMAIL_DOMAIN: $(DHD_LEGACY_EMAIL_DOMAIN)
        DHD_BYPASS_ACCESS: $(DHD_BYPASS_ACCESS)
        DHD_ENABLE_ENTITLEMENT_TEST: $(DHD_ENABLE_ENTITLEMENT_TEST)
        DHD_STRIPE_SUBSCRIBE_URL: $(DHD_STRIPE_SUBSCRIBE_URL)
        DHD_APNS_ENVIRONMENT: $(DHD_APNS_ENVIRONMENT)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.multiorg.app.mac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconMac
        CODE_SIGN_ENTITLEMENTS: MultiOrg/Supporting/MultiOrgMac.entitlements
      configs:
        Debug:
          APS_ENVIRONMENT: development
          DHD_APNS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
          DHD_APNS_ENVIRONMENT: production
    dependencies:
      - package: Supabase
    scheme:
      testTargets: []
